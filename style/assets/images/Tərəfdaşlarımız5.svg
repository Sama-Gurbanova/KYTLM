<svg width="400" height="150" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150">
  <!-- Background (white) -->
  <rect width="400" height="150" fill="#FFFFFF"/>
  
  <!-- Circular icon with blue top and green bottom with wavy lines -->
  <defs>
    <clipPath id="circleClip">
      <circle cx="75" cy="75" r="60"/>
    </clipPath>
    <pattern id="wavyLines" x="0" y="0" width="120" height="60" patternUnits="userSpaceOnUse">
      <path d="M 0 20 Q 20 15, 40 20 T 80 20 T 120 20" stroke="#047857" stroke-width="2.5" fill="none"/>
      <path d="M 0 30 Q 20 25, 40 30 T 80 30 T 120 30" stroke="#047857" stroke-width="2.5" fill="none"/>
      <path d="M 0 40 Q 20 35, 40 40 T 80 40 T 120 40" stroke="#047857" stroke-width="2.5" fill="none"/>
    </pattern>
  </defs>
  
  <!-- Circle container -->
  <circle cx="75" cy="75" r="60" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>
  
  <!-- Blue top half of circle -->
  <path d="M 15 75 A 60 60 0 0 1 135 75 L 135 15 A 60 60 0 0 0 15 15 Z" fill="#2563EB"/>
  
  <!-- Green bottom half of circle with wavy pattern -->
  <path d="M 15 75 A 60 60 0 0 0 135 75 L 135 135 A 60 60 0 0 1 15 135 Z" fill="#10B981"/>
  <rect x="15" y="75" width="120" height="60" fill="url(#wavyLines)" clip-path="url(#circleClip)"/>
  
  <!-- Text: GILAN -->
  <text x="160" y="60" font-family="'Arial', 'Helvetica', sans-serif" font-size="36" font-weight="bold" fill="#2D3748" letter-spacing="1px">GILAN</text>
  
  <!-- Text: PIVOT -->
  <text x="160" y="95" font-family="'Arial', 'Helvetica', sans-serif" font-size="28" font-weight="600" fill="#2D3748" letter-spacing="0.5px">PIVOT</text>
</svg>